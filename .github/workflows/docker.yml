name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      bff: ${{ steps.filter.outputs.bff }}
      driver-service: ${{ steps.filter.outputs.driver-service }}
      booking-service: ${{ steps.filter.outputs.booking-service }}
      routes-service: ${{ steps.filter.outputs.routes-service }}
      conflict-detection: ${{ steps.filter.outputs.conflict-detection }}
      messaging-service: ${{ steps.filter.outputs.messaging-service }}
      db-migrate: ${{ steps.filter.outputs.db-migrate }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
            bff:
              - 'services/bff/**'
            driver-service:
              - 'services/driver-service/**'
            booking-service:
              - 'services/booking-service/**'
            routes-service:
              - 'services/routes-service/**'
            conflict-detection:
              - 'services/conflict-detection-service/**'
            messaging-service:
              - 'services/messaging-service/**'
            db-migrate:
              - 'db/**'

  build-api-gateway:
    needs: changes
    if: needs.changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/api-gateway:latest
          platforms: linux/amd64,linux/arm64

  build-bff:
    needs: changes
    if: needs.changes.outputs.bff == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/bff
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/bff:latest
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}
          no-cache: true

  build-driver-service:
    needs: changes
    if: needs.changes.outputs.driver-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/driver-service
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/driver-service:latest
          platforms: linux/amd64,linux/arm64

  build-booking-service:
    needs: changes
    if: needs.changes.outputs.booking-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/booking-service
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/booking-service:latest
          platforms: linux/amd64,linux/arm64

  build-routes-service:
    needs: changes
    if: needs.changes.outputs.routes-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/routes-service
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/routes-service:latest
          platforms: linux/amd64,linux/arm64

  build-conflict-detection:
    needs: changes
    if: needs.changes.outputs.conflict-detection == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/conflict-detection-service
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/conflict-detection:latest
          platforms: linux/amd64,linux/arm64

  build-messaging-service:
    needs: changes
    if: needs.changes.outputs.messaging-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/messaging-service
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/messaging-service:latest
          platforms: linux/amd64,linux/arm64

  build-db-migrate:
    needs: changes
    if: needs.changes.outputs.db-migrate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./db
          push: true
          tags: ghcr.io/cs7ns2-traffic-service/traffic-service/db-migrate:latest
          platforms: linux/amd64,linux/arm64


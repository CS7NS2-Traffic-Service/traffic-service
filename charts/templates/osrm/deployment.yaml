apiVersion: apps/v1
kind: Deployment
metadata:
  name: osrm
  namespace: default
  labels:
    app: osrm
spec:
  selector:
    matchLabels:
      app: osrm
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: osrm
      labels:
        app: osrm
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: osrm
          image: {{ .Values.image.registry }}/osrm-ireland:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          ports:
            - containerPort: 5555
              name: osrm
          livenessProbe:
            tcpSocket:
              port: 5555
            initialDelaySeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            periodSeconds: 10
---

apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-rw -U traffic; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: db-migrate
          image: {{ .Values.image.registry }}/db-migrate:{{ .Values.image.tag }}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              value: postgresql://traffic:traffic@postgres-rw:5432/traffic
      restartPolicy: Never
  backoffLimit: 4

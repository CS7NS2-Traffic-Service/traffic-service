apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: default
  labels:
    app: bff
spec:
  selector:
    matchLabels:
      app: bff
  replicas: {{ .Values.replicaCount.bff }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: bff
      labels:
        app: bff
    spec:
      containers:
        - name: bff
          image: {{ .Values.image.registry }}/bff:{{ .Values.image.tag }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.ports.bff }}
            initialDelaySeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.ports.bff }}
            initialDelaySeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            periodSeconds: 10
          ports:
            - containerPort: {{ .Values.ports.bff }}
              name: bff
---

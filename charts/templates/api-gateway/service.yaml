apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  selector:
    app: api-gateway
  type: NodePort
  ports:
    - name: api-gateway
      port: {{ .Values.ports.apiGateway }}
      targetPort: {{ .Values.ports.apiGateway }}
      nodePort: {{ .Values.ports.nodePort }}
---

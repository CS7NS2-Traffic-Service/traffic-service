apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  selector:
    app: api-gateway
  type: {{ .Values.apiGateway.serviceType }}
  ports:
    - name: api-gateway
      port: {{ .Values.apiGateway.loadBalancerPort | default .Values.ports.apiGateway }}
      targetPort: {{ .Values.ports.apiGateway }}
      {{- if eq .Values.apiGateway.serviceType "NodePort" }}
      nodePort: {{ .Values.ports.nodePort }}
      {{- end }}
---

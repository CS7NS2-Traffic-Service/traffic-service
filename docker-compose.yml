services:
  api-gateway:
    build: services/api-gateway
    ports:
      - "8000:8000"
    environment:
      BFF_URL: http://bff:8080
      SERVICE_DRIVER: http://driver-service:8081
      SERVICE_BOOKING: http://booking-service:8082
      SERVICE_ROUTES: http://routes-service:8083
      SERVICE_MESSAGING: http://messaging-service:8085
      JWT_SECRET_KEY: super-secret-key
      REDIS_URL: redis://redis:6379
    depends_on:
      - bff
      - driver-service
      - booking-service
      - routes-service
      - conflict-detection-service
      - messaging-service
      - redis

  bff:
    build:
      context: services/bff
      args:
        VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    expose:
      - "8080"

  driver-service:
    build: services/driver-service
    expose:
      - "8081"
    environment:
      DATABASE_URL: postgresql://traffic:traffic@postgres:5432/traffic
      JWT_SECRET_KEY: super-secret-key
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  booking-service:
    build: services/booking-service
    expose:
      - "8082"
    environment:
      DATABASE_URL: postgresql://traffic:traffic@postgres:5432/traffic
      REDIS_URL: redis://redis:6379
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  routes-service:
    build: services/routes-service
    expose:
      - "8083"
    environment:
      DATABASE_URL: postgresql://traffic:traffic@postgres:5432/traffic
      OSRM_URL: http://osrm:5000
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      osrm:
        condition: service_healthy

  conflict-detection-service:
    build: services/conflict-detection-service
    expose:
      - "8084"
    environment:
      DATABASE_URL: postgresql://traffic:traffic@postgres:5432/traffic
      REDIS_URL: redis://redis:6379
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  messaging-service:
    build: services/messaging-service
    expose:
      - "8085"
    environment:
      DATABASE_URL: postgresql://traffic:traffic@postgres:5432/traffic
      REDIS_URL: redis://redis:6379
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: traffic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  osrm:
    image: osrm/osrm-backend
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/ireland-and-northern-ireland-latest.osrm
    healthcheck:
      test:
        [
          "CMD",
          "perl",
          "-MIO::Socket::INET",
          "-e",
          "exit(IO::Socket::INET->new('localhost:5000') ? 0 : 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  db-migrate:
    build: ./db
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://traffic:traffic@postgres:5432/traffic
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

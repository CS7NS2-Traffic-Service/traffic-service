services:
  api-gateway:
    build: services/api-gateway
    ports:
      - "8000:8000"
    environment:
      BFF_URL: http://bff:8080
      SERVICE_DRIVER: http://driver-service:8081
    depends_on:
      - bff
      - driver-service

  bff:
    build: services/bff
    expose:
      - "8080"

  driver-service:
    build: services/driver-service
    expose:
      - "8081"
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: traffic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic"]
      interval: 5s
      retries: 5

  db-migrate:
    build: ./db
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://traffic:traffic@postgres:5432/traffic
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

services:
  api-gateway:
    build: services/api-gateway
    ports:
      - "8000:8000"
    environment:
      BFF_URL: http://bff:8080
    depends_on:
      - bff

  bff:
    build: services/bff
    expose:
      - "8080"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: traffic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
